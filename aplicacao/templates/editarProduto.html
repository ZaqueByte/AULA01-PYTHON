{% load bootstrap5 %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Produto</title>
    {% bootstrap_css %}
</head>

<body>
    <div class="container mt-4">
        <h1>Edição de Produto</h1>
        <form action="{% url 'urleditarProduto' p.id %}" method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="txtNome" class="form-label">Nome</label>
                <input type="text" id="txtNome" name="txtNome" value="{{ p.nome }}" class="form-control">
            </div>

            <div class="mb-3">
                <label for="txtPreco" class="form-label">Preço</label>
                <input type="text" id="txtPreco" name="txtPreco" value="{{ p.preco }}" class="form-control">
            </div>

            <div class="mb-3">
                <label for="txtQtde" class="form-label">Quantidade</label>
                <input type="number" id="txtQtde" name="txtQtde" value="{{ p.qtde }}" class="form-control">
            </div>

            <div class="mb-3">
                <label for="txtData" class="form-label">Data</label>
                <input type="date" id="txtData" name="txtData" value="{{ p.data }}" class="form-control">
            </div>

            <div class="mb-3">
                <label for="txtDescricao" class="form-label">Descrição</label>
                <input type="text" id="txtDescricao" name="txtDescricao" value="{{ p.descricao }}" class="form-control">
            </div>

            <input type="submit" value="Salvar" class="btn btn-success">
            <a href="{% url 'urlproduto' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>

</html>
